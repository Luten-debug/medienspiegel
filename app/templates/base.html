<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medienspiegel - Giga Factory Berlin-Brandenburg</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7S2 12 2 12z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </div>
                <div>
                    <h1>Medienspiegel</h1>
                    <span class="subtitle">Giga Factory Berlin-Brandenburg</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary"
                        hx-post="/api/collect"
                        hx-target="#collection-status"
                        hx-swap="innerHTML">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                    Jetzt sammeln
                </button>
            </div>
        </div>
    </header>

    <main>
        <div id="collection-status">
            {% block collection_status %}{% endblock %}
        </div>
        <div id="mail-status"></div>

        {% block content %}{% endblock %}
    </main>

    <footer>
        <span>Medienspiegel &mdash; Automatisierte Medienbeobachtung für die Giga Factory</span>
    </footer>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>

  # === POLNISCH ===
  - lang: pl
    country: PL
    search_terms:
      - 'Tesla Grünheide'
      - '"Gigafactory Berlin"'
      - '"Giga Berlin"'
      - 'fabryka Tesla Grünheide'
      - 'Tesla fabryka Brandenburg'
      - 'Tesla Niemcy fabryka'
      - 'Gigafabryka Berlin'

# API Keys
api_keys:
  anthropic: ""
  newsapi: ""

# Gmail Einstellungen
mail:
  enabled: false
  sender: ""
  password: ""
  recipients:
    - ""
  subject_prefix: "Medienspiegel Giga Factory"

# Automatischer Zeitplan
schedule:
  enabled: true
  time: "08:00"
  refresh_interval: 15  # Auto-Refresh alle 15 Min (nur Sammlung, keine KI-Credits)

# Zusaetzliche RSS-Feeds
rss_feeds: []

# Twitter/X Einstellungen
twitter:
  enabled: true
  max_tweets: 30
  accounts:
    - Gf4Tesla          # Gigafactory Berlin News
    - alex_avoigt       # Alex Voigt - Tesla/EV Analyst
    - Teslaconomics     # Teslaconomics
    - SawyerMerritt     # Sawyer Merritt - Tesla News
    - TeslaEurope       # Tesla Europe
    - Tesla             # Tesla offiziell

# Sammel-Einstellungen
collection:
  max_articles_per_source: 30
  request_delay: 1.0
